domain_id: pools
normative: NORMATIVE.md
verification: VERIFICATION.md

items:
  - id: POL-001
    section: "Active Pool"
    summary: "Active pool storage with HashMap and coin_index"
    status: verified
    spec_ref: "docs/requirements/domains/pools/specs/POL-001.md"
    tests:
      - vv_req_pol_001_empty_pool_get_returns_none
      - vv_req_pol_001_empty_pool_contains_returns_false
      - vv_req_pol_001_empty_pool_collection_queries
      - vv_req_pol_001_get_returns_inserted_item
      - vv_req_pol_001_contains_after_submit
      - vv_req_pol_001_len_increments_on_submit
      - vv_req_pol_001_active_items_returns_items
      - vv_req_pol_001_active_bundle_ids_returns_ids
      - vv_req_pol_001_stats_active_count
      - vv_req_pol_001_stats_total_cost_nonzero
      - vv_req_pol_001_arc_sharing
      - vv_req_pol_001_removals_populated_for_coin_spend
      - vv_req_pol_001_item_num_spends_correct
      - vv_req_pol_001_item_height_added
      - vv_req_pol_001_mempool_coin_creator_none_for_unknown
    notes: "ActivePool struct with items/coin_index/mempool_coins HashMaps + virtual_cost/fee/spend accumulators. NIL_PUZZLE_HASH constant (sha256tree of Program::default()) enables coin-spend tests."

  - id: POL-002
    section: "Active Pool"
    summary: "Active pool capacity management and eviction"
    status: verified
    spec_ref: "docs/requirements/domains/pools/specs/POL-002.md"
    tests:
      - vv_req_pol_002_no_eviction_when_space_available
      - vv_req_pol_002_lowest_score_evicted_first
      - vv_req_pol_002_mempool_full_when_fpc_too_low
      - vv_req_pol_002_mempool_full_empty_pool_too_small
      - vv_req_pol_002_too_many_spends
      - vv_req_pol_002_minimal_eviction
    notes: "ActivePool::evict_for() sorts candidates ASC by descendant_score, evicts until space freed or FPC comparison fails. TooManySpends check precedes capacity check. is_expiry_protected() scaffolded for POL-003. Coin amount affects CLVM encoding cost — tests use amounts 1-127 (1-byte CLVM encoding) for exact virtual_cost comparisons."

  - id: POL-003
    section: "Active Pool"
    summary: "Expiry protection during eviction"
    status: verified
    spec_ref: "docs/requirements/domains/pools/specs/POL-003.md"
    tests:
      - vv_req_pol_003_protected_skipped_non_expiring_gets_mempool_full
      - vv_req_pol_003_far_future_expiry_is_evictable
      - vv_req_pol_003_no_expiry_no_protection
      - vv_req_pol_003_expiring_evicts_lower_fpc_expiring
      - vv_req_pol_003_mempool_full_when_all_protected
      - vv_req_pol_003_configurable_protection_window
      - vv_req_pol_003_boundary_at_protection_window_edge
    notes: "is_expiry_protected() guards abh > current_height && abh <= current_height + protection_blocks. evict_for() has two passes: pass 1 evicts non-protected items, pass 2 (only if new item is itself expiry-protected) evicts protected items with lower FPC. abh values 1-127 encode as 1-byte CLVM atoms; probe_abh_virtual_cost() measures abh-bundle vc separately from nil-bundle vc."

