domain_id: pools
normative: NORMATIVE.md
verification: VERIFICATION.md

items:
  - id: POL-001
    section: "Active Pool"
    summary: "Active pool storage with HashMap and coin_index"
    status: verified
    spec_ref: "docs/requirements/domains/pools/specs/POL-001.md"
    tests:
      - vv_req_pol_001_empty_pool_get_returns_none
      - vv_req_pol_001_empty_pool_contains_returns_false
      - vv_req_pol_001_empty_pool_collection_queries
      - vv_req_pol_001_get_returns_inserted_item
      - vv_req_pol_001_contains_after_submit
      - vv_req_pol_001_len_increments_on_submit
      - vv_req_pol_001_active_items_returns_items
      - vv_req_pol_001_active_bundle_ids_returns_ids
      - vv_req_pol_001_stats_active_count
      - vv_req_pol_001_stats_total_cost_nonzero
      - vv_req_pol_001_arc_sharing
      - vv_req_pol_001_removals_populated_for_coin_spend
      - vv_req_pol_001_item_num_spends_correct
      - vv_req_pol_001_item_height_added
      - vv_req_pol_001_mempool_coin_creator_none_for_unknown
    notes: "ActivePool struct with items/coin_index/mempool_coins HashMaps + virtual_cost/fee/spend accumulators. NIL_PUZZLE_HASH constant (sha256tree of Program::default()) enables coin-spend tests."

  - id: POL-002
    section: "Active Pool"
    summary: "Active pool capacity management and eviction"
    status: verified
    spec_ref: "docs/requirements/domains/pools/specs/POL-002.md"
    tests:
      - vv_req_pol_002_no_eviction_when_space_available
      - vv_req_pol_002_lowest_score_evicted_first
      - vv_req_pol_002_mempool_full_when_fpc_too_low
      - vv_req_pol_002_mempool_full_empty_pool_too_small
      - vv_req_pol_002_too_many_spends
      - vv_req_pol_002_minimal_eviction
    notes: "ActivePool::evict_for() sorts candidates ASC by descendant_score, evicts until space freed or FPC comparison fails. TooManySpends check precedes capacity check. is_expiry_protected() scaffolded for POL-003. Coin amount affects CLVM encoding cost — tests use amounts 1-127 (1-byte CLVM encoding) for exact virtual_cost comparisons."

  - id: POL-003
    section: "Active Pool"
    summary: "Expiry protection during eviction"
    status: verified
    spec_ref: "docs/requirements/domains/pools/specs/POL-003.md"
    tests:
      - vv_req_pol_003_protected_skipped_non_expiring_gets_mempool_full
      - vv_req_pol_003_far_future_expiry_is_evictable
      - vv_req_pol_003_no_expiry_no_protection
      - vv_req_pol_003_expiring_evicts_lower_fpc_expiring
      - vv_req_pol_003_mempool_full_when_all_protected
      - vv_req_pol_003_configurable_protection_window
      - vv_req_pol_003_boundary_at_protection_window_edge
    notes: "is_expiry_protected() guards abh > current_height && abh <= current_height + protection_blocks. evict_for() has two passes: pass 1 evicts non-protected items, pass 2 (only if new item is itself expiry-protected) evicts protected items with lower FPC. abh values 1-127 encode as 1-byte CLVM atoms; probe_abh_virtual_cost() measures abh-bundle vc separately from nil-bundle vc."

  - id: POL-004
    section: "Pending Pool"
    summary: "Pending pool with count and cost limits"
    status: verified
    spec_ref: "docs/requirements/domains/pools/specs/POL-004.md"
    tests:
      - vv_req_pol_004_timelocked_item_goes_to_pending
      - vv_req_pol_004_pending_not_in_active_pool
      - vv_req_pol_004_pending_len_increments
      - vv_req_pol_004_stats_pending_count
      - vv_req_pol_004_pending_bundle_ids
      - vv_req_pol_004_count_limit_enforced
      - vv_req_pol_004_cost_limit_enforced
      - vv_req_pol_004_promotion_on_new_block
      - vv_req_pol_004_not_promoted_too_early
      - vv_req_pol_004_removal_cleans_up
      - vv_req_pol_004_pending_cost_tracked
    notes: "PendingPool struct (HashMap + pending_coin_index + pending_cost). MempoolItem gained assert_seconds field. MempoolStats gained pending_cost field. submit() restructured: MempoolItem built before routing, then dispatched to pending or active pool. drain_pending(height, timestamp) returns SpendBundles for re-submission; called by on_new_block() (LCY-001)."

  - id: POL-005
    section: "Pending Pool"
    summary: "Pending pool deduplication via pending_coin_index"
    status: verified
    spec_ref: "docs/requirements/domains/pools/specs/POL-005.md"
    tests:
      - vv_req_pol_005_index_populated_on_insert
      - vv_req_pol_005_conflict_detected
      - vv_req_pol_005_rbf_succeeds
      - vv_req_pol_005_rbf_fails_not_superset
      - vv_req_pol_005_rbf_fails_fpc_too_low
      - vv_req_pol_005_rbf_fails_fee_bump_too_low
      - vv_req_pol_005_index_cleaned_on_promotion
      - vv_req_pol_005_no_conflict_cache_for_pending
    notes: "pending_coin_index (coin_id -> bundle_id) maintained for all pending items. Conflict detection in if-is_pending block of submit(): superset check, FPC check (aggregate conflicts), fee bump check (min_rbf_fee_bump). On success: evict conflicts then insert. Failed RBF returns error without touching conflict cache. get_pending_coin_spender() public method added. FPC test uses b1.amount=100 (high FPC) vs b2=2-spend {same coin, coin_B(amount=1)} to guarantee FPC_b2 < FPC_b1."

  - id: POL-006
    section: "Conflict Cache"
    summary: "Conflict cache with count and cost limits"
    status: verified
    spec_ref: "docs/requirements/domains/pools/specs/POL-006.md"
    tests:
      - vv_req_pol_006_initial_state
      - vv_req_pol_006_add_increments_count
      - vv_req_pol_006_count_limit_enforced
      - vv_req_pol_006_cost_limit_enforced
      - vv_req_pol_006_duplicate_not_inserted
      - vv_req_pol_006_drain_returns_all
      - vv_req_pol_006_drain_clears_cache
      - vv_req_pol_006_non_conflict_rejection_not_cached
      - vv_req_pol_006_pending_rbf_not_cached
    notes: "ConflictCache struct (HashMap<Bytes32, (SpendBundle, u64)> + total_cost accumulator). Separate RwLock. insert() enforces count/cost limits and deduplicates. drain() clears all entries. add_to_conflict_cache() public method (used by CFR-005 for RBF failure wiring and by tests). drain_conflict() public method (used by LCY-001 on_new_block). Full RBF integration test (bundle added after active-pool RBF failure) deferred to CFR-005."

  - id: POL-007
    section: "Seen Cache"
    summary: "LRU seen cache for DoS protection"
    status: verified
    spec_ref: "docs/requirements/domains/pools/specs/POL-007.md"
    tests:
      - vv_req_pol_007_added_before_clvm_validation
      - vv_req_pol_007_lru_evicts_oldest
      - vv_req_pol_007_pending_pool_check_after_eviction
      - vv_req_pol_007_conflict_cache_check
      - vv_req_pol_007_clear_resets_seen_cache
      - vv_req_pol_007_clear_resets_all_pools
    notes: "Existing SeenCache (HashSet + VecDeque FIFO) is functionally LRU for seen-only access patterns. Added pending pool + conflict cache checks to submit() dedup block (after active pool check). Added clear() method clearing all four state components (active pool, pending pool, conflict cache, seen cache). ConflictCache::contains() helper added."

  - id: POL-008
    section: "Auxiliary Indices"
    summary: "Identical spend dedup index for cost adjustment"
    status: verified
    spec_ref: "docs/requirements/domains/pools/specs/POL-008.md"
    tests:
      - vv_req_pol_008_first_bundle_establishes_bearer
      - vv_req_pol_008_second_bundle_gets_cost_saving
      - vv_req_pol_008_non_eligible_not_indexed
      - vv_req_pol_008_cost_bearer_removal_reassigns
      - vv_req_pol_008_feature_disabled
      - vv_req_pol_008_different_solutions_not_deduped
      - vv_req_pol_008_effective_cost_calculation
    notes: "dedup_index: HashMap<(Bytes32, Bytes32), Bytes32> and dedup_waiters: HashMap<(Bytes32, Bytes32), Vec<Bytes32>> added to ActivePool. sha2 moved to [dependencies] for sha256_bytes(). MempoolItem gained cost_saving/effective_virtual_cost/dedup_keys fields. Per-spend cost approximated as cost/num_spends (chia-consensus 0.26 lacks per-spend cost). Item construction split: pending path builds before lock, active path builds inside lock to atomically compute cost_saving. Public API: remove(), dedup_index_len(), get_dedup_bearer(). Pass-through puzzle ((q . ((51 NIL_PUZZLE_HASH amount)))) used for dedup-eligible test bundles. Nil-puzzle bundles have eligible_for_dedup=false (coin_amount > spend_additions=0)."

  - id: POL-009
    section: "Auxiliary Indices"
    summary: "Singleton tracking index for chain ordering"
    status: draft
    spec_ref: "docs/requirements/domains/pools/specs/POL-009.md"
    tests: []
    notes: ""

  - id: POL-010
    section: "Concurrency"
    summary: "RwLock per pool, Mutex for BLS, Send + Sync"
    status: verified
    spec_ref: "docs/requirements/domains/pools/specs/POL-010.md"
    tests:
      - vv_req_pol_010_send_sync_compile_check
      - vv_req_pol_010_interior_mutability
      - vv_req_pol_010_concurrent_reads
      - vv_req_pol_010_concurrent_submit_and_read
      - vv_req_pol_010_concurrent_bls_cache_access
      - vv_req_pol_010_lock_ordering_no_deadlock
      - vv_req_pol_010_batch_correct_insertion
      - vv_req_pol_010_phase1_does_not_stall_readers
    notes: "Mempool struct fields: pool/pending/conflict/seen_cache as RwLock, bls_cache as Mutex. All public methods take &self (interior mutability). Send+Sync verified via compile-time generic bound. Concurrent tests: 8 readers, submitter+reader race, 4 submitters+4 readers under load (64 total inserts). BLS mutex test: 2 concurrent submissions both succeed. batch_correct_insertion: submit_batch(10 bundles) → 10 successes. phase1_does_not_stall_readers: reader observes only 4 or 5 items (never stalls) while writer runs CLVM validation."
